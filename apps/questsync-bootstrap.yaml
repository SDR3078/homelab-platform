# questsync bootstrap — namespace + TLS certificate (in-repo platform glue).
#
# Layered under the questsync workload Application (apps/questsync.yaml). Owns the
# cluster-side resources the app repo's Kustomize does not declare:
#   - Namespace 'questsync' (declared in Git so PSA 'restricted' labels are first-class)
#   - Certificate 'tasks-batzbak-tls' (dedicated cert for the public host)
#   - Ingress 'questsync' (operator host tasks.batzbak.top — kept out of the public app repo)
# No SealedSecret here — QuestSync is stateless and multi-user (each user brings their
# own Habitica creds), so there is no server-side application secret. Same split as
# apps/portfolio-site-bootstrap.yaml, minus the secrets.
#
# Sync-wave 0 — runs before the workload (wave 1). The Ingress here consumes the
# Certificate's Secret and routes to the workload's Service, so ns + cert come first.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: questsync-bootstrap
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "0"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: questsync

  source:
    repoURL: https://github.com/SDR3078/homelab-platform.git
    targetRevision: main
    path: charts/questsync

  destination:
    server: https://kubernetes.default.svc
    namespace: questsync

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - ServerSideApply=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
