# cert-manager
#
# Watches Certificate and Issuer/ClusterIssuer resources, speaks ACME
# to Let's Encrypt on our behalf, writes issued certs into Secrets.
#
# CRDs (Certificate, Issuer, ClusterIssuer, Order, Challenge,
# CertificateRequest) are installed by the chart when installCRDs=true.
# Without that flag the CRDs would need to be applied separately.

apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cert-manager
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default

  source:
    repoURL: https://charts.jetstack.io
    chart: cert-manager
    targetRevision: v1.16.2
    helm:
      releaseName: cert-manager
      values: |
        installCRDs: true
        global:
          leaderElection:
            namespace: cert-manager

  destination:
    server: https://kubernetes.default.svc
    namespace: cert-manager

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
