# Placeholder Application to verify the GitOps loop works.
# Deploys a trivial whoami pod to prove ArgoCD is functioning end-to-end.

apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: whoami-test
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default

  source:
    repoURL: https://github.com/SDR3078/homelab-platform.git
    targetRevision: main
    path: charts/whoami-test

  destination:
    server: https://kubernetes.default.svc
    namespace: whoami-test

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true