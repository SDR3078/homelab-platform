# ingress-nginx
#
# The cluster's HTTP(S) edge. Watches Ingress resources, regenerates
# an internal nginx config, listens on ports 80/443 via a k3s
# klipper-lb LoadBalancer Service bound to the node's IP (192.168.68.50).
#
# Exposes every service in the cluster that declares an Ingress with
# ingressClassName: nginx (or any Ingress with no ingressClassName set,
# since we mark this the default IngressClass).

apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: ingress-nginx
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default

  source:
    repoURL: https://kubernetes.github.io/ingress-nginx
    chart: ingress-nginx
    targetRevision: 4.12.1
    helm:
      releaseName: ingress-nginx
      values: |
        controller:
          replicaCount: 1
          service:
            type: LoadBalancer
          ingressClassResource:
            name: nginx
            default: true
          ingressClass: nginx
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              memory: 512Mi

  destination:
    server: https://kubernetes.default.svc
    namespace: ingress-nginx

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
