# cert-manager ClusterIssuers
#
# Two ClusterIssuers, both using Let's Encrypt via DNS-01 through Cloudflare.
# - letsencrypt-staging: untrusted "Fake LE" certs, loose rate limits. Use
#   this to verify the ACME pipeline end-to-end before touching production.
# - letsencrypt-production: real browser-trusted certs, tight rate limits.
#   Switch the Certificate resource's issuerRef to this one only after
#   staging has successfully issued at least once.
#
# Both reference the same Cloudflare API token Secret in the cert-manager
# namespace (where ClusterIssuer-referenced Secrets must live, regardless
# of which namespace the Certificate resource itself is in).

---
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-staging
spec:
  acme:
    server: https://acme-staging-v02.api.letsencrypt.org/directory
    email: sander.dereu@outlook.com
    privateKeySecretRef:
      name: letsencrypt-staging-account-key
    solvers:
      - dns01:
          cloudflare:
            apiTokenSecretRef:
              name: cloudflare-api-token
              key: api-token
        selector:
          dnsZones:
            - "batzbak.top"

---
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-production
spec:
  acme:
    server: https://acme-v02.api.letsencrypt.org/directory
    email: sander.dereu@outlook.com
    privateKeySecretRef:
      name: letsencrypt-production-account-key
    solvers:
      - dns01:
          cloudflare:
            apiTokenSecretRef:
              name: cloudflare-api-token
              key: api-token
        selector:
          dnsZones:
            - "batzbak.top"
