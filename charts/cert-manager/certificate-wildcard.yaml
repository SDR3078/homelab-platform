# Wildcard TLS certificate for *.lab.batzbak.top
#
# Single source of truth for the wildcard cert used by every internal
# service. cert-manager issues it via the letsencrypt-staging ClusterIssuer
# and stores the result as Secret 'wildcard-lab-tls' in this namespace.
#
# secretTemplate.annotations tell reflector to copy the Secret to listed
# service namespaces. As new services come online, append their namespace
# to the reflection-*-namespaces annotations below.
#
# issuerRef points at letsencrypt-production (real browser-trusted certs).
# Switched from -staging after verifying the ACME pipeline worked end-to-end.
# Re-issuance is forced by deleting the Secret 'wildcard-lab-tls' in this
# namespace; cert-manager then reconciles and requests a fresh cert from
# production.

apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: wildcard-lab-tls
  namespace: cert-manager
spec:
  secretName: wildcard-lab-tls
  secretTemplate:
    annotations:
      # Opt this Secret into reflection at all.
      reflector.v1.k8s.emberstack.com/reflection-allowed: "true"
      # Allow-list of namespaces (comma-separated, regex supported)
      # where copies of this Secret are permitted. Append new
      # namespaces as services come online (e.g., "argocd,data-platform").
      reflector.v1.k8s.emberstack.com/reflection-allowed-namespaces: "argocd,data-platform,wedding,mlflow"
      # Automatically create copies in matching namespaces below,
      # rather than waiting for on-demand mirroring requests.
      reflector.v1.k8s.emberstack.com/reflection-auto-enabled: "true"
      reflector.v1.k8s.emberstack.com/reflection-auto-namespaces: "argocd,data-platform,wedding,mlflow"
  issuerRef:
    name: letsencrypt-production
    kind: ClusterIssuer
  dnsNames:
    - "*.lab.batzbak.top"
  duration: 2160h
  renewBefore: 720h
  privateKey:
    algorithm: ECDSA
    size: 256
    rotationPolicy: Always
