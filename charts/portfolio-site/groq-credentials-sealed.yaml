# Groq API key for the portfolio-site api (the chat agent's LLM provider).
# Reseal: kubectl create secret generic groq-credentials -n portfolio-site \
#   --from-literal=GROQ_API_KEY=<key> --dry-run=client -o yaml | kubeseal \
#   --controller-name=sealed-secrets-controller --controller-namespace=sealed-secrets -o yaml
---
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: groq-credentials
  namespace: portfolio-site
spec:
  encryptedData:
    GROQ_API_KEY: 
  template:
    metadata:
      name: groq-credentials
      namespace: portfolio-site
