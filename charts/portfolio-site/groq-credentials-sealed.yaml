# Groq API key + read-only GitHub token for the portfolio-site api (chat agent).
# Rotate/add keys with: charts/portfolio-site/seal-github-token.sh
# (kubeseal --merge-into; controller=sealed-secrets-controller ns=sealed-secrets).
---
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: groq-credentials
  namespace: portfolio-site
spec:
  encryptedData:
    GITHUB_TOKEN: 
    GROQ_API_KEY: 
  template:
    metadata:
      name: groq-credentials
      namespace: portfolio-site
