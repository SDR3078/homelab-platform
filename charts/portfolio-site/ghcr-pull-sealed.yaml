# GHCR image-pull credential for the private portfolio-site-{web,api} images (classic PAT, read:packages).
# Reseal: bash ~/seal-ghcr-pull.sh
---
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: ghcr-pull
  namespace: portfolio-site
spec:
  encryptedData:
    .dockerconfigjson: 
  template:
    metadata:
      name: ghcr-pull
      namespace: portfolio-site
    type: kubernetes.io/dockerconfigjson
