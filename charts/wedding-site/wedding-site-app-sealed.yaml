# wedding-site app runtime secret
#
# Holds the runtime config the wedding-site Next.js app reads via envFrom
# (see helm/templates/deployment.yaml in the tenant repo). One key:
#
#   - AUTH_SECRET — Auth.js JWT signing/encryption key. Rotating it
#     invalidates all active sessions, so it's effectively a long-lived
#     secret. Keep in password manager under
#     'homelab-platform/wedding-site-auth-secret' for DR (master-key-loss
#     recovery requires regenerating from this value).
#
# DATABASE_URL is composed at container startup via Kubernetes $(VAR)
# substitution from the wedding-credentials secret (reflected from
# charts/application-data/wedding-credentials-sealed.yaml in this repo)
# plus the database.* values in the tenant chart's helm/values.yaml.
# Rotating the DB password = reseal wedding-credentials in
# charts/application-data/; both the CNPG-managed role and the composed
# DATABASE_URL pick up the new value on next pod restart.
#
# Admin status is NOT in this secret. It lives in the users.isAdmin DB
# column on postgres-tenants/wedding (see src/db/schema/auth.ts in the
# tenant repo). Toggle it via SQL UPDATE — no reseal, no pod restart.
#
# ────────────────────────────────────────────────────────────────────────
# OPERATIONS RUNBOOK — generating + sealing this secret from scratch
# ────────────────────────────────────────────────────────────────────────
# 1. Generate AUTH_SECRET locally (32 bytes base64):
#
#      AUTH_SECRET="$(openssl rand -base64 32)"
#      echo "$AUTH_SECRET"   # save to password manager as
#                            # 'homelab-platform/wedding-site-auth-secret'
#
# 2. Build the plaintext Secret manifest (NOT committed):
#
#      kubectl create secret generic wedding-site-app \
#        --namespace wedding \
#        --from-literal=AUTH_SECRET="${AUTH_SECRET}" \
#        --dry-run=client -o yaml > /tmp/wedding-site-app.yaml
#
# 3. Encrypt with kubeseal — overwrites THIS file's encryptedData block:
#
#      kubeseal -f /tmp/wedding-site-app.yaml \
#        -w charts/wedding-site/wedding-site-app-sealed.yaml \
#        --controller-name=sealed-secrets-controller \
#        --controller-namespace=sealed-secrets
#
#    NOTE: kubeseal overwrites the YAML body but DOES NOT preserve this
#    runbook header. Manually re-prepend the comment block above before
#    committing.
#
# 4. Shred plaintext + commit + push:
#
#      shred -u /tmp/wedding-site-app.yaml
#      git add charts/wedding-site/wedding-site-app-sealed.yaml
#      git commit -m "reseal wedding-site-app"
#      git push
#
# Rotation of AUTH_SECRET: same procedure from step 1.
# Rotation of the DB password: reseal wedding-credentials in
# charts/application-data/, NOT this file.
# Admin add/remove: SQL UPDATE on users.isAdmin in postgres-tenants/wedding,
# NOT this file.
# ────────────────────────────────────────────────────────────────────────

---
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: wedding-site-app
  namespace: wedding
spec:
  encryptedData:
    AUTH_SECRET: 
  template:
    metadata:
      name: wedding-site-app
      namespace: wedding
    type: Opaque
