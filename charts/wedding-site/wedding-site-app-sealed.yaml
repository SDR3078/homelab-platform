# wedding-site app runtime secret
#
# Holds the runtime config the wedding-site Next.js app reads via envFrom
# (see helm/templates/deployment.yaml in the tenant repo). Two keys:
#
#   - AUTH_SECRET — Auth.js JWT signing/encryption key. Rotating it
#     invalidates all active sessions, so it's effectively a long-lived
#     secret. Keep in password manager under
#     'homelab-platform/wedding-site-auth-secret' for DR (master-key-loss
#     recovery requires regenerating from this value).
#
#   - ADMIN_USER_IDS — comma-separated list of users.id values authorised
#     to access /admin. Empty at first deploy (chicken-and-egg: the user
#     row doesn't exist until you sign in once with an invite code). See
#     "ADMIN_USER_IDS chicken-and-egg" below.
#
# DATABASE_URL is NOT in this secret. It is composed at container startup
# via Kubernetes $(VAR) substitution from the wedding-credentials secret
# (reflected from charts/application-data/wedding-credentials-sealed.yaml
# in this repo) plus the database.* values in the tenant chart's
# helm/values.yaml. Rotating the DB password = reseal wedding-credentials
# in charts/application-data/; both the CNPG-managed role and the composed
# DATABASE_URL pick up the new value on next pod restart.
#
# ────────────────────────────────────────────────────────────────────────
# OPERATIONS RUNBOOK — generating + sealing this secret from scratch
# ────────────────────────────────────────────────────────────────────────
# 1. Generate AUTH_SECRET locally (32 bytes base64):
#
#      AUTH_SECRET="$(openssl rand -base64 32)"
#      echo "$AUTH_SECRET"   # save to password manager as
#                            # 'homelab-platform/wedding-site-auth-secret'
#
# 2. Build the plaintext Secret manifest (NOT committed):
#
#      kubectl create secret generic wedding-site-app \
#        --namespace wedding \
#        --from-literal=AUTH_SECRET="${AUTH_SECRET}" \
#        --from-literal=ADMIN_USER_IDS="" \
#        --dry-run=client -o yaml > /tmp/wedding-site-app.yaml
#
# 3. Encrypt with kubeseal — overwrites THIS file's encryptedData block:
#
#      kubeseal -f /tmp/wedding-site-app.yaml \
#        -w charts/wedding-site/wedding-site-app-sealed.yaml \
#        --controller-name=sealed-secrets-controller \
#        --controller-namespace=sealed-secrets
#
#    NOTE: kubeseal overwrites the YAML body but DOES NOT preserve this
#    runbook header. Manually re-prepend the comment block above before
#    committing.
#
# 4. Shred plaintext + commit + push:
#
#      shred -u /tmp/wedding-site-app.yaml
#      git add charts/wedding-site/wedding-site-app-sealed.yaml
#      git commit -m "reseal wedding-site-app"
#      git push
#
# ADMIN_USER_IDS chicken-and-egg: at first deploy ADMIN_USER_IDS is
# empty — no user.id can exist yet. Strategy:
#   1. First deploy with ADMIN_USER_IDS="". App boots; nobody is admin.
#   2. Sign in with an invite code (created via `npm run invite:create`
#      from the tenant repo, run against the deployed DB via port-forward).
#      The first-login flow creates a `user` row in the wedding DB and
#      binds it to the invite.
#   3. Look up the id:
#        kubectl port-forward -n application-data svc/postgres-tenants-rw 5433:5432 &
#        # password is in password manager as 'homelab-platform/postgres-tenants-wedding'
#        psql "postgresql://wedding:<pw>@localhost:5433/wedding" \
#          -c 'SELECT id, name FROM "user";'
#   4. Re-run steps 1-4 above with --from-literal=ADMIN_USER_IDS="<that id>".
#      ArgoCD applies the new sealed Secret; controller decrypts; pod
#      restarts (envFrom snapshot is read at container start, so a
#      Deployment rollout is required for the new value to take effect).
#
# Rotation of AUTH_SECRET: same procedure from step 1.
# Rotation of the DB password: reseal wedding-credentials in
# charts/application-data/, NOT this file.
# ────────────────────────────────────────────────────────────────────────

---
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: wedding-site-app
  namespace: wedding
spec:
  encryptedData:
    ADMIN_USER_IDS: 
    AUTH_SECRET: 
  template:
    metadata:
      name: wedding-site-app
      namespace: wedding
    type: Opaque
