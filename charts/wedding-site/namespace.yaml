# wedding namespace — tenant for the Anna & Sander wedding-site app
#
# Houses the Next.js app deployed via the chart in the SDR3078/wedding-site
# repository (see apps/wedding-site.yaml). Platform-side glue (this
# Namespace and the SealedSecrets in this directory) is owned in this
# repo and applied by apps/wedding-site-bootstrap.yaml. The chart itself
# is in a separate tenant repo so its lifecycle decouples from platform
# changes — CI in the tenant repo bumps image.tag on every push, ArgoCD
# rolls a new pod, this repo never has to know.
#
# Cross-namespace dependency: the wedding-site pod connects to CNPG at
#   postgres-tenants-rw.application-data.svc.cluster.local:5432/wedding
# An egress NetworkPolicy in the tenant chart restricts outbound traffic
# to that target plus DNS — see helm/templates/networkpolicy.yaml in the
# wedding-site repo (configured via values.networkPolicy.database).
#
# Pod Security Admission: 'restricted' is enforced. The wedding-site
# container runs as non-root (uid 1001), drops ALL capabilities, sets
# seccomp RuntimeDefault, no privileged options (see helm/templates/
# deployment.yaml in the tenant repo). application-data stays at
# 'baseline' only because CNPG needs fsGroup quirks; this tenant doesn't,
# so we tighten one notch.
#
# ────────────────────────────────────────────────────────────────────────
# Database provisioning — fully declarative
# ────────────────────────────────────────────────────────────────────────
# The wedding role + database are declared in:
#   charts/application-data/postgres-tenants-cluster.yaml
#     - managed.roles entry: wedding
#     - Database CRD:        wedding (owner: wedding)
#
# The role's password is sealed at:
#   charts/application-data/wedding-credentials-sealed.yaml
# with reflector annotations that mirror the unsealed Secret into THIS
# namespace as `wedding-credentials`. The tenant chart's deployment.yaml
# composes DATABASE_URL at startup from $(VAR) substitution against that
# secret + values.database.{host,port,name}.
#
# To add a NEW tenant role+DB or rotate the password, follow the runbook
# header in postgres-tenants-cluster.yaml (one kubeseal step + one git
# commit; CNPG and reflector handle the rest).
#
# Initial schema is created by the tenant repo's `npm run db:push`
# (drizzle-kit) the first time the app rolls out, port-forwarding into
# postgres-tenants-rw on application-data. Schema migrations stay at
# level 1 until the tenant repo adds a drizzle migrate Job.
# ────────────────────────────────────────────────────────────────────────

apiVersion: v1
kind: Namespace
metadata:
  name: wedding
  labels:
    app.kubernetes.io/name: wedding
    app.kubernetes.io/part-of: homelab-platform
    app.kubernetes.io/managed-by: argocd

    pod-security.kubernetes.io/enforce: restricted
    pod-security.kubernetes.io/audit: restricted
    pod-security.kubernetes.io/warn: restricted
