---
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: lakekeeper-s3-credentials
  namespace: lakekeeper
spec:
  encryptedData:
    AWS_ACCESS_KEY_ID: 
    AWS_SECRET_ACCESS_KEY: 
  template:
    metadata:
      annotations:
        # Mirror into the consumer namespaces so workloads can read+write
        # the iceberg-warehouse bucket directly with these MinIO svcacct
        # creds (the catalog handles names; storage access is direct):
        #   - airflow:              DuckDB-based DAGs that bypass
        #                           Lakekeeper's S3V4RestSigner; bronze
        #                           ingest / train / score KPOs via
        #                           pyiceberg over the worker.
        #   - insurance-retention:  serving's GET /select/gold endpoint,
        #                           which reads gold.selections via the
        #                           shared `lakehouse.build_catalog()`.
        reflector.v1.k8s.emberstack.com/reflection-allowed: "true"
        reflector.v1.k8s.emberstack.com/reflection-allowed-namespaces: "airflow,insurance-retention"
        reflector.v1.k8s.emberstack.com/reflection-auto-enabled: "true"
        reflector.v1.k8s.emberstack.com/reflection-auto-namespaces: "airflow,insurance-retention"
      name: lakekeeper-s3-credentials
      namespace: lakekeeper
    type: Opaque
