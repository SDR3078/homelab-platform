# ScheduledBackup — weekly base backup of postgres-tenants
#
# Mirrors data-platform's postgres-scheduled-backup.yaml. The WAL archive
# runs continuously (configured on the Cluster's barmanObjectStore in
# postgres-tenants-cluster.yaml), so PITR granularity is independent of
# this schedule — we can recover to any second within retention regardless
# of when the last base backup ran.
#
# Without periodic base backups, the WAL chain grows unbounded and recovery
# time becomes prohibitive. So this resource is required, not optional.
#
# Schedule format is 6-field cron (seconds minutes hours dom month dow),
# NOT the standard 5-field crontab format. So `0 0 3 * * 0` means
# Sunday 03:00:00 UTC.
#
# Offset by 1h from data-platform's `0 0 2 * * 0` so the two Clusters'
# weekly base backups don't compete for MinIO bandwidth.
#
# `immediate: true` triggers a base backup right when this resource is
# first applied — gives instant verification of the pipeline rather than
# waiting until next Sunday.
#
# `backupOwnerReference: cluster` makes resulting Backup CRs children of
# the Cluster — when the Cluster is deleted, K8s garbage-collects the
# Backup CRs. Actual S3 data persists regardless (CNPG/barman doesn't
# reach into the bucket on Cluster delete).
#
# Sync-wave: this lives in the application-data Application (sync-wave 1),
# applied after the cloudnative-pg Application (sync-wave 0) registered
# the ScheduledBackup CRD.
#
# ────────────────────────────────────────────────────────────────────────
# OPERATIONS RUNBOOK — manually triggering a backup
# ────────────────────────────────────────────────────────────────────────
# To force a base backup outside the schedule (e.g., before a risky
# operation like a tenant migration), apply a one-off Backup resource:
#
#   kubectl apply -f - <<EOF
#   apiVersion: postgresql.cnpg.io/v1
#   kind: Backup
#   metadata:
#     name: postgres-tenants-manual-$(date +%Y%m%d-%H%M%S)
#     namespace: application-data
#   spec:
#     cluster:
#       name: postgres-tenants
#   EOF
#
# Listing backups:    kubectl get backups.postgresql.cnpg.io -n application-data
# Inspecting one:     kubectl describe backup <name> -n application-data
# Watching progress:  kubectl get backups.postgresql.cnpg.io -n application-data -w
#
# Schedule changes: edit the cron, commit, push. CNPG controller picks up
# the change on its next reconciliation. No data migration needed.
# ────────────────────────────────────────────────────────────────────────

---
apiVersion: postgresql.cnpg.io/v1
kind: ScheduledBackup
metadata:
  name: postgres-tenants-weekly
  namespace: application-data
  labels:
    app.kubernetes.io/name: postgres-tenants-weekly
    app.kubernetes.io/part-of: homelab-platform
spec:
  # Sunday 03:00:00 UTC. 6-field cron (s m h dom month dow). Offset 1h
  # from postgres-data-platform-weekly to spread bucket load.
  schedule: "0 0 3 * * 0"

  # Run a base backup immediately when this resource is first applied,
  # so we get instant feedback rather than waiting for next Sunday.
  immediate: true

  # Backup CRs are children of the Cluster — cleaned up on Cluster delete.
  # S3 data persists independently of this owner reference.
  backupOwnerReference: cluster

  cluster:
    name: postgres-tenants
