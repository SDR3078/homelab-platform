# ArgoCD repository credential for the private wedding-site repo
#
# ArgoCD's repo server uses this credential to clone
# https://github.com/SDR3078/wedding-site (which is a PRIVATE repo)
# during reconciliation of the wedding-site Application
# (apps/wedding-site.yaml). Without it, that Application errors with
# "authentication required: Repository not found" because the
# unauthenticated GitHub API returns 404 for private repos.
#
# Discovery mechanism: ArgoCD's repo server scans the argocd namespace
# for Secrets carrying the label `argocd.argoproj.io/secret-type=repository`.
# Each such Secret describes ONE repository's credentials. ArgoCD matches
# Applications to credentials by repoURL prefix, so this Secret's `url`
# field must match what apps/wedding-site.yaml uses verbatim
# (https://github.com/SDR3078/wedding-site.git, including the .git suffix).
#
# Token type: fine-grained PAT (NOT classic). Fine-grained is supported
# by GitHub's git HTTPS auth and offers least-privilege scoping — this
# token has access to ONE repository and ONE permission (Contents: Read).
# Classic PATs would require the broader `repo` scope (read+write to all
# private repos), which is over-privileged for a read-only clone.
#
# Why this is sealed (not just kubectl-applied): so that on cluster
# rebuild, ArgoCD can clone the tenant repo without manual intervention.
# The encrypted secret in Git decrypts automatically once the
# sealed-secrets controller is running with the restored master key.
#
# ────────────────────────────────────────────────────────────────────────
# OPERATIONS RUNBOOK — generating and sealing this credential from scratch
# ────────────────────────────────────────────────────────────────────────
# 1. Generate a fine-grained PAT on GitHub:
#
#      https://github.com/settings/personal-access-tokens/new
#
#    - Token name: 'homelab-platform ArgoCD wedding-site repo'
#    - Expiration: 1 year (or whatever; record date below on each rotation)
#    - Resource owner: SDR3078 (or the account owning wedding-site)
#    - Repository access: Only select repositories → SDR3078/wedding-site
#    - Repository permissions:
#        Contents: Read-only
#        (Metadata: Read-only — auto-added by GitHub, leave it)
#        Everything else: No access
#    - Generate, copy. Save to password manager as
#      'homelab-platform/argocd-wedding-site-repo-pat'
#      (the token is shown ONCE).
#
#    Record the expiration date here on each rotation:
#      - Last sealed: 2026-04-28
#      - Expires:    No expiration date set (per github.com/settings/personal-access-tokens)
#
#    NOTE: GitHub historically capped fine-grained PATs at 1 year max.
#    If the UI ever shows a forced expiry on rotation (policy change),
#    fill in the actual date here so calendar reminders can track it.
#    Voluntary annual rotation is a sane cadence regardless.
#
# 2. Build the plaintext Secret manifest (NOT committed). The
#    `argocd.argoproj.io/secret-type=repository` label is the trigger
#    that makes ArgoCD pick up the credential:
#
#      read -s -p "Fine-grained PAT: " PAT; echo
#      cat > /tmp/argocd-wedding-site-repo.yaml <<YAML
#      apiVersion: v1
#      kind: Secret
#      metadata:
#        name: wedding-site-repo
#        namespace: argocd
#        labels:
#          argocd.argoproj.io/secret-type: repository
#      type: Opaque
#      stringData:
#        type: git
#        url: https://github.com/SDR3078/wedding-site.git
#        username: SDR3078
#        password: ${PAT}
#      YAML
#
# 3. Encrypt with kubeseal. NOTE: kubeseal overwrites the YAML body but
#    DOES NOT preserve this runbook header. Manually re-prepend the
#    comment block above before committing:
#
#      kubeseal -f /tmp/argocd-wedding-site-repo.yaml \
#        -w /tmp/argocd-wedding-site-repo-sealed.yaml \
#        --controller-name=sealed-secrets-controller \
#        --controller-namespace=sealed-secrets
#
# 4. Reassemble (header + sealed body) + shred plaintext + commit + push:
#
#      sed '/^---$/,$d' charts/argocd/wedding-site-repo-sealed.yaml > /tmp/header.txt
#      cat /tmp/header.txt /tmp/argocd-wedding-site-repo-sealed.yaml \
#        > charts/argocd/wedding-site-repo-sealed.yaml
#      shred -u /tmp/argocd-wedding-site-repo.yaml \
#               /tmp/argocd-wedding-site-repo-sealed.yaml \
#               /tmp/header.txt
#      git add charts/argocd/wedding-site-repo-sealed.yaml
#      git commit -m "reseal argocd wedding-site repo credential"
#      git push
#
# Rotation: same procedure when the PAT approaches expiry. GitHub also
# allows 'regenerate' on an existing fine-grained token (issues new
# credentials, invalidates old).
#
# Failure mode: with no expiration set, expiry-driven freeze is N/A.
# The PAT can still be REVOKED (intentionally or in response to
# compromise) — same symptom: wedding-site Application returns to
# "Repository not found" / authentication errors. Cluster keeps
# running (existing pods unaffected), but no new image rollouts can
# sync until the credential is regenerated. Rotate via the procedure
# above.
# ────────────────────────────────────────────────────────────────────────

---
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: wedding-site-repo
  namespace: argocd
spec:
  encryptedData:
    password: 
    type: 
    url: 
    username: 
  template:
    metadata:
      labels:
        argocd.argoproj.io/secret-type: repository
      name: wedding-site-repo
      namespace: argocd
    type: Opaque
