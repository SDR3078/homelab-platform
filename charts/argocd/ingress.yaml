# ArgoCD server Ingress
#
# Exposes the argocd-server Service at https://argocd.lab.batzbak.top.
# TLS is terminated at ingress-nginx using the wildcard Secret
# 'wildcard-lab-tls' (reflected from the cert-manager namespace into
# this one by the reflector operator).
#
# ArgoCD's server speaks HTTPS internally (its Service port 443 serves
# ArgoCD's own self-signed cert). backend-protocol=HTTPS tells ingress-nginx
# to re-encrypt traffic to the backend over HTTPS, avoiding the need to
# put ArgoCD into --insecure mode (which would require changes to a
# ConfigMap that wasn't installed via GitOps).

apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: argocd-server
  namespace: argocd
  annotations:
    nginx.ingress.kubernetes.io/backend-protocol: "HTTPS"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
spec:
  ingressClassName: nginx
  rules:
    - host: argocd.lab.batzbak.top
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: argocd-server
                port:
                  number: 443
  tls:
    - hosts:
        - argocd.lab.batzbak.top
      secretName: wildcard-lab-tls
