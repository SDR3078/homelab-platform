# ArgoCD repo credential for the PRIVATE portfolio-site repo (its helm/ chart).
# Reuses the wedding-site token value, pulled live from secret argocd/wedding-site-repo.
# Requires that token's fine-grained scope to include the portfolio-site repo.
---
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: portfolio-site-repo
  namespace: argocd
spec:
  encryptedData:
    password: 
    type: 
    url: 
    username: 
  template:
    metadata:
      labels:
        argocd.argoproj.io/secret-type: repository
      name: portfolio-site-repo
      namespace: argocd
    type: Opaque
