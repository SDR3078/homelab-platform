# Cluster CA cert for verifying MinIO's TLS endpoint
#
# CNPG's barmanObjectStore.endpointCA needs a Secret reference (not a
# ConfigMap) holding the CA cert that signed MinIO's auto-generated
# server cert. With MinIO operator's `requestAutoCert: true`, the
# Tenant's cert is signed via the Kubernetes CSR API by the cluster's
# own signing CA — for k3s, that's `k3s-server-ca@<timestamp>`. This
# is THE SAME CA cert that's auto-injected into every namespace as
# ConfigMap kube-root-ca.crt.
#
# A CA cert is public information by definition (clients distribute it
# to verify servers), so we commit it as a regular Secret — no
# kubeseal. Cluster CA rotation in k3s defaults to 10 years, so this
# static commit isn't a maintenance hazard.
#
# ────────────────────────────────────────────────────────────────────────
# OPERATIONS RUNBOOK — refreshing this Secret if the cluster CA rotates
# ────────────────────────────────────────────────────────────────────────
# k3s renews the cluster CA automatically near expiry (~10y default).
# When that happens, refresh this file:
#
#   kubectl get cm kube-root-ca.crt -n data-platform \
#     -o jsonpath='{.data.ca\.crt}'
#
# Replace the cert block below with the output, commit, push. ArgoCD
# syncs, the new CA is in place before MinIO's next cert rotation.
# ────────────────────────────────────────────────────────────────────────

---
apiVersion: v1
kind: Secret
metadata:
  name: postgres-backup-ca
  namespace: data-platform
  labels:
    app.kubernetes.io/name: postgres-backup-ca
    app.kubernetes.io/part-of: homelab-platform
  annotations:
    # Mirror this Secret to the application-data namespace so the
    # postgres-tenants Cluster's barmanObjectStore endpointCA can read it.
    # Append namespaces (comma-separated) when new data tiers come online.
    reflector.v1.k8s.emberstack.com/reflection-allowed: "true"
    reflector.v1.k8s.emberstack.com/reflection-allowed-namespaces: "application-data"
    reflector.v1.k8s.emberstack.com/reflection-auto-enabled: "true"
    reflector.v1.k8s.emberstack.com/reflection-auto-namespaces: "application-data"
type: Opaque
stringData:
  ca.crt: |
