# insurance-retention SERVING: lets the FastAPI pod download model artifacts from MinIO.
# Sealed copy of the 'mlflow-artifacts' MinIO service account (same creds as
# charts/mlflow/mlflow-s3-credentials-sealed.yaml), resealed for this namespace.
# Decrypts with the restored master-key, so no regeneration on a clean rebuild;
# reseal only if the svcacct is rotated. Procedure: docs/rebuild.md Step 12 (and Step 7).
---
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: insurance-retention-s3-credentials
  namespace: insurance-retention
spec:
  encryptedData:
    AWS_ACCESS_KEY_ID: 
    AWS_SECRET_ACCESS_KEY: 
  template:
    metadata:
      name: insurance-retention-s3-credentials
      namespace: insurance-retention
    type: Opaque
